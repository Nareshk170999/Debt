name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:          # redeploy on demand from the Actions tab
  schedule:
    - cron: '*/15 * * * *'    # refresh the snapshot every ~15 min (best-effort)

permissions:
  contents: write             # needed to push the built site to gh-pages

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Bake sheet into the site
        run: node scripts/fetch-sheet.mjs
        env:
          VITE_SHEET_URL: ${{ vars.VITE_SHEET_URL }}
      - name: Build
        run: npm run build
        env:
          VITE_SHEET_URL: ${{ vars.VITE_SHEET_URL }}
          VITE_DASHBOARD_TITLE: ${{ vars.VITE_DASHBOARD_TITLE }}
          VITE_REFRESH_SECONDS: ${{ vars.VITE_REFRESH_SECONDS }}
          VITE_PROXY_URL: ${{ vars.VITE_PROXY_URL }}
      - name: Publish built site to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # adds .nojekyll automatically so /assets is served as-is
